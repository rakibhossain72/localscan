{% extends "base.html" %}

{% block title %}500 - Server Error | LocalScan Explorer{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
    <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mb-6">
        <svg class="w-12 h-12 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
    </div>
    <h1 class="text-6xl font-bold text-slate-800 mb-2">500</h1>
    <p class="text-xl font-medium text-slate-600 mb-2">Something went wrong</p>
    <p class="text-slate-400 max-w-md mb-8">
        {% if detail %}{{ detail }}{% else %}An unexpected error occurred on our end. Please try again in a moment.{% endif %}
    </p>
    <div class="flex flex-col sm:flex-row gap-3">
        <a href="/" class="inline-flex items-center px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            Go Home
        </a>
        <button onclick="location.reload()" class="inline-flex items-center px-5 py-2.5 bg-slate-100 text-slate-700 rounded-lg font-medium hover:bg-slate-200 transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            Try Again
        </button>
    </div>
</div>
{% endblock %}
