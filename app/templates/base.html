<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LocalScan Explorer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <span class="text-xl font-bold tracking-tight text-slate-900">LocalScan</span>
                    </a>
                    <nav class="hidden md:ml-10 md:flex space-x-8">
                        <a href="/" class="text-slate-600 hover:text-blue-600 font-medium px-3 py-2 transition-colors">Home</a>
                        <a href="/docs" class="text-slate-600 hover:text-blue-600 font-medium px-3 py-2 transition-colors">API Docs</a>
                    </nav>
                </div>
                <div class="flex-1 max-w-lg mx-8 hidden lg:block">
                    <form action="/search" method="GET" class="relative">
                        <input type="text" name="q" placeholder="Search by Address / Txn Hash / Block" class="w-full bg-slate-100 border-none rounded-lg py-2 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center text-slate-500 text-sm">
                <div class="mb-4 md:mb-0">
                    &copy; 2026 LocalScan Indexer. All rights reserved.
                </div>
                <div class="flex space-x-6">
                    <a href="#" class="hover:text-blue-600">Twitter</a>
                    <a href="#" class="hover:text-blue-600">GitHub</a>
                    <a href="#" class="hover:text-blue-600">Docs</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
